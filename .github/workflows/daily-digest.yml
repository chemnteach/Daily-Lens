name: Daily Lens — Generate & Deploy

on:
  # Run every day at 6:00 AM Mountain Time (13:00 UTC)
  schedule:
    - cron: '0 13 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Lens pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: scripts
        run: |
          python main.py --output ../docs

      - name: Commit and push updated digest
        run: |
          git config user.name "Daily Lens Bot"
          git config user.email "daily-lens-bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || (
            git commit -m "📰 Daily digest for $(date -u +'%Y-%m-%d')"
            git push
          )

  # Deploy to GitHub Pages from /docs folder
  deploy:
    needs: generate-digest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # Get the latest commit with updated digest

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
